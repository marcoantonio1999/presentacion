  <style>
    :root {

    }

      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      line-height: 1.05;
    }

    p {
      margin: 0.9rem 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin-top: 1.2rem;
      padding: 0.78rem 1rem;
      border-radius: 999px;
      color: var(--ink);
      text-decoration: none;
      border: 1px solid rgba(34, 197, 94, 0.22);
